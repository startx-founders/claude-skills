name: evals

# Tier 2 — the trigger signal. Advisory, never a merge gate. See
# docs/CI-ARCHITECTURE.md.
#
#   pr-eval   : on a same-repo PR that touches a skill, run that skill's evals
#               and post an advisory comment. Skipped for forks (no secret
#               exposure to untrusted code), so the pull_request_target /
#               two-workflow complexity never applies.
#   nightly   : run every skill, regenerate the skill-health board + badges, and
#               publish them to the `eval-results` branch (its git log = trend).

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC nightly
  workflow_dispatch:
  pull_request:
    paths:
      - "skills/**"

concurrency:
  group: evals-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-eval:
    name: Trigger evals on changed skills (advisory)
    # Same-repo PRs only: fork PRs cannot see the secret, and we never run their
    # code in a secret-bearing context.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Determine changed skills (that ship evals.json)
        id: changed
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, subprocess
          base = os.environ["GITHUB_BASE_REF"]
          subprocess.run(["git", "fetch", "origin", base], check=True, capture_output=True)
          diff = subprocess.run(
              ["git", "diff", "--name-only", f"origin/{base}...HEAD"],
              check=True, capture_output=True, text=True).stdout.splitlines()
          changed = set()
          for p in diff:
              parts = p.split("/")
              if len(parts) >= 3 and parts[0] == "skills":
                  d = os.path.join(*parts[:3])
                  if os.path.exists(os.path.join(d, "evals.json")):
                      changed.add(parts[2])
          print(f"skills={','.join(sorted(changed))}")
          PY
      - name: Install Claude Code CLI
        if: steps.changed.outputs.skills != ''
        run: npm install -g @anthropic-ai/claude-code && claude --version
      - name: Run trigger evals for changed skills
        if: steps.changed.outputs.skills != ''
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          EVAL_ONLY: ${{ steps.changed.outputs.skills }}
          EVAL_SAMPLES: "3"
          EVAL_REPORT: "eval-report.md"
        run: python3 .github/scripts/run_skill_evals.py .
      - name: Upsert advisory PR comment
        if: steps.changed.outputs.skills != ''
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('eval-report.md', 'utf8');
            const marker = '<!-- skill-trigger-evals -->';
            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;
            const {data: comments} = await github.rest.issues.listComments({owner, repo, issue_number});
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({owner, repo, comment_id: existing.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }

  nightly:
    name: Nightly trigger evals + publish board
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code && claude --version
      - name: Run trigger evals (all skills)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          EVAL_SAMPLES: "5"
          EVAL_REPORT: "eval-out/report.md"
          EVAL_JSON: "eval-out/results.json"
          EVAL_BOARD: "eval-out/skill-health.md"
          EVAL_BADGES: "eval-out/badges"
        run: |
          mkdir -p eval-out/badges
          python3 .github/scripts/run_skill_evals.py .
      - name: Post board to job summary
        if: always()
        run: cat eval-out/skill-health.md >> "$GITHUB_STEP_SUMMARY" || true
      - name: Publish board + badges to eval-results branch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin eval-results 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/eval-results; then
            git worktree add /tmp/erb origin/eval-results
            git -C /tmp/erb checkout -B eval-results
          else
            git worktree add --detach /tmp/erb
            git -C /tmp/erb checkout --orphan eval-results
            git -C /tmp/erb rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p /tmp/erb/docs /tmp/erb/badges
          cp eval-out/skill-health.md /tmp/erb/docs/skill-health.md
          cp eval-out/badges/*.json /tmp/erb/badges/ 2>/dev/null || true
          cd /tmp/erb
          git add -A
          git commit -m "chore(evals): update skill-health board" \
            || { echo "no eval changes"; exit 0; }
          git push origin eval-results
